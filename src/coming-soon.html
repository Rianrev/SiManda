<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BNN - SI MANDA</title>
  <link rel="icon" href="assets/img/logo1.ico">
  <script src="auth.js"></script>
  <script>if (!getSession()) window.location.replace('login.html');</script>
  <link rel="stylesheet" href="assets/css/sidebar.css">
  <link rel="stylesheet" href="assets/css/tailwind.min.css">
</head>

<body class="bg-slate-100 font-sans antialiased">

  <!-- ===== HEADER ===== -->
  <header class="fixed top-0 left-0 right-0 h-14 bg-navy-800 flex items-center px-4 z-50 shadow-lg">
    <button id="toggleBtn" class="text-white p-2 rounded-lg hover:bg-white/10 transition mr-3" title="Toggle Sidebar">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <a href="index.html" class="flex items-center gap-3">
      <img src="assets/img/logo1.jpeg" class="h-9 w-9 rounded-full ring-2 ring-white/30 object-cover" alt="Logo BNN">
      <div class="flex flex-col leading-tight">
        <span class="text-white font-bold text-base tracking-wide">SI MANDA</span>
        <span class="text-blue-200 text-xs">Sistem Informasi Monitoring Data</span>
      </div>
    </a>
    <div id="pageTitle" class="ml-6 px-3 py-1 bg-white/10 rounded-full text-white text-sm font-medium"></div>
    <button onclick="history.back()"
      class="ml-4 flex items-center gap-1.5 px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white text-sm rounded-lg transition">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      Kembali
    </button>
    <div class="ml-auto flex items-center gap-2">
      <span id="userBadge" class="px-2.5 py-1 bg-white/10 rounded-full text-white text-xs font-medium"></span>
      <button onclick="authLogout()"
        class="flex items-center gap-1.5 px-3 py-1.5 bg-white/10 hover:bg-red-500/30 text-white text-xs rounded-lg transition">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Keluar
      </button>
    </div>
  </header>

  <!-- ===== SIDEBAR ===== -->
  <aside id="sidebar"
    class="fixed top-14 left-0 h-[calc(100vh-3.5rem)] w-64 bg-navy-900 overflow-y-auto scrollbar-thin transition-transform duration-300 z-40 shadow-xl">
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main id="main" class="ml-64 mt-14 h-[calc(100vh-3.5rem)] bg-white transition-all duration-300 flex flex-col items-center justify-center">

    <div class="flex flex-col items-center gap-6 text-center px-6">
      <!-- Icon -->
      <div class="w-24 h-24 bg-navy-900/5 rounded-3xl flex items-center justify-center">
        <svg class="w-12 h-12 text-navy-800/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>

      <!-- Text -->
      <div>
        <h2 class="text-slate-800 font-bold text-2xl tracking-tight">Segera Hadir</h2>
        <p id="pageSubtitle" class="text-slate-400 text-sm mt-2 max-w-sm">Fitur ini sedang dalam tahap pengembangan dan akan segera tersedia.</p>
      </div>

      <!-- Badge -->
      <span class="inline-flex items-center gap-2 px-4 py-2 bg-blue-50 text-blue-600 text-sm font-medium rounded-full border border-blue-100">
        <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
        Dalam Pengembangan
      </span>

      <a href="index.html" class="mt-2 px-5 py-2.5 bg-navy-800 text-white text-sm font-medium rounded-lg hover:bg-navy-700 transition">
        Kembali ke Beranda
      </a>
    </div>

  </main>

  <!-- Update Banner -->
  <div id="update-banner" class="hidden fixed bottom-6 right-6 z-[9999] w-72 bg-navy-900 border border-white/10 rounded-2xl shadow-2xl p-4 flex-col gap-3">
    <div class="flex items-start gap-3">
      <div class="w-9 h-9 rounded-xl bg-blue-500/20 flex items-center justify-center shrink-0">
        <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-white text-sm font-semibold">Update Tersedia</p>
        <p id="update-version-text" class="text-slate-400 text-xs mt-0.5">Versi baru siap diinstal</p>
      </div>
      <button id="update-dismiss" class="text-slate-500 hover:text-slate-300 transition text-lg leading-none">&times;</button>
    </div>
    <button id="update-restart-btn" class="w-full py-2 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white text-sm font-semibold rounded-lg transition flex items-center justify-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Restart &amp; Install Update
    </button>
  </div>

  <script src="js/coming-soon.js"></script>
  <script src="js/updater.js"></script>

</body>
</html>

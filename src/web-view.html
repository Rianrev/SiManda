<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BNN - SI MANDA</title>
  <link rel="icon" href="assets/img/logo1.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: {
              950: '#0a1929',
              900: '#0f2744',
              800: '#1a3a5c',
              700: '#1e4d8c',
            }
          },
          fontFamily: {
            headline: ['Manrope', 'sans-serif'],
            body:     ['Inter',   'sans-serif'],
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .scrollbar-thin::-webkit-scrollbar { width: 4px; }
      .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
      .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    }
  </style>
</head>

<body class="bg-slate-100 font-body antialiased">

  <!-- ===== HEADER ===== -->
  <header class="fixed top-0 left-0 right-0 h-14 bg-navy-800 flex items-center px-4 z-50 shadow-lg">
    <button id="toggleBtn" class="text-white p-2 rounded-lg hover:bg-white/10 transition mr-3" title="Toggle Sidebar">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <a href="index.html" class="flex items-center gap-3">
      <img src="assets/img/logo1.jpeg" class="h-9 w-9 rounded-full ring-2 ring-white/30 object-cover" alt="Logo BNN">
      <div class="flex flex-col leading-tight">
        <span class="text-white font-bold text-base tracking-wide">SI MANDA</span>
        <span class="text-blue-200 text-xs">Sistem Informasi Monitoring Data</span>
      </div>
    </a>
    <div id="pageTitle" class="ml-6 px-3 py-1 bg-white/10 rounded-full text-white text-sm font-medium"></div>
    <button onclick="history.back()"
      class="ml-4 flex items-center gap-1.5 px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white text-sm rounded-lg transition">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      Kembali
    </button>
  </header>

  <!-- ===== SIDEBAR ===== -->
  <aside id="sidebar"
    class="fixed top-14 left-0 h-[calc(100vh-3.5rem)] w-64 bg-navy-900 overflow-y-auto scrollbar-thin transition-transform duration-300 z-40 shadow-xl">
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main id="main" class="ml-64 mt-14 h-[calc(100vh-3.5rem)] bg-white transition-all duration-300 flex flex-col">

    <!-- Loading state -->
    <div id="loadingState" class="flex flex-col items-center justify-center h-full gap-4">
      <div class="w-10 h-10 border-4 border-navy-800 border-t-transparent rounded-full animate-spin"></div>
      <span class="text-slate-500 text-sm">Memuat Google Sheet...</span>
    </div>

    <!-- Error state -->
    <div id="errorState" class="hidden flex flex-col items-center justify-center h-full gap-3 text-center px-6">
      <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center">
        <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
      </div>
      <h3 class="text-slate-700 font-semibold text-lg">Gagal Memuat Halaman</h3>
      <p id="errorMsg" class="text-slate-400 text-sm max-w-sm">Periksa koneksi internet atau pastikan Anda memiliki akses ke dokumen ini.</p>
      <a href="index.html" class="mt-2 px-4 py-2 bg-navy-800 text-white text-sm rounded-lg hover:bg-navy-700 transition">
        Kembali ke Beranda
      </a>
    </div>

    <!-- Webview -->
    <webview id="myWebView" src=""
      class="hidden flex-1 w-full h-full border-0">
    </webview>

  </main>

  <script>
    function activateSidebarLink() {
      const currentPage = window.location.pathname.split('/').pop() || 'index.html';
      const currentParams = new URLSearchParams(window.location.search);
      const currentTitle = currentParams.get('title');
      let best = null, fallback = null;
      for (const a of document.querySelectorAll('#sidebar a')) {
        try {
          const u = new URL(a.href, window.location.href);
          const aPage = u.pathname.split('/').pop();
          if (aPage === currentPage) {
            if (currentPage === 'web-view.html') {
              if (u.searchParams.get('param1') === currentParams.get('param1')) { best = a; break; }
            } else if (currentPage === 'dashboard-ananda.html') {
              if (u.searchParams.get('sheetId') === currentParams.get('sheetId')) { best = a; break; }
            } else { best = a; break; }
          }
          if (!fallback && currentTitle && u.searchParams.get('title') === currentTitle) {
            fallback = a;
          }
        } catch(e) {}
      }
      const target = best || fallback;
      if (target) {
        target.classList.add('active');
        const det = target.closest('details');
        if (det) det.open = true;
      }
    }

    const toggleBtn = document.getElementById('toggleBtn');
    const sidebar   = document.getElementById('sidebar');
    const main      = document.getElementById('main');
    let open = true;

    toggleBtn.addEventListener('click', () => {
      open = !open;
      sidebar.classList.toggle('-translate-x-full', !open);
      main.classList.toggle('ml-64', open);
      main.classList.toggle('ml-0', !open);
    });

    document.addEventListener('DOMContentLoaded', () => {
      fetch('sidebar.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('sidebar').innerHTML = html;
          activateSidebarLink();
        });

      const urlParams  = new URLSearchParams(window.location.search);
      const url        = urlParams.get('param1');
      const title      = urlParams.get('title') || '';
      const webView    = document.getElementById('myWebView');
      const loading    = document.getElementById('loadingState');
      const errorState = document.getElementById('errorState');
      const errorMsg   = document.getElementById('errorMsg');
      const pageTitle  = document.getElementById('pageTitle');

      if (title) pageTitle.textContent = title;

      try {
        const parsed = new URL(url);
        if (parsed.hostname !== 'docs.google.com' || !parsed.pathname.startsWith('/spreadsheets/')) {
          throw new Error('URL tidak diizinkan');
        }

        webView.setAttribute('src', url);

        webView.addEventListener('did-finish-load', () => {
          loading.classList.add('hidden');
          webView.classList.remove('hidden');
          webView.classList.add('flex');
        });

        webView.addEventListener('did-fail-load', () => {
          loading.classList.add('hidden');
          errorState.classList.remove('hidden');
          errorState.classList.add('flex');
        });

      } catch (e) {
        loading.classList.add('hidden');
        errorMsg.textContent = 'URL tidak valid atau tidak diizinkan.';
        errorState.classList.remove('hidden');
        errorState.classList.add('flex');
      }
    });
  </script>

</body>
</html>

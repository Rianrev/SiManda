<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BNN - SI MANDA · Inspekta Learn</title>
  <link rel="icon" href="assets/img/logo1.ico">
  <script src="auth.js"></script>
  <script>if (!getSession()) window.location.replace('login.html');</script>
  <link rel="stylesheet" href="assets/css/sidebar.css">
  <link rel="stylesheet" href="assets/css/tailwind.min.css">
</head>
<body class="bg-slate-100 font-sans antialiased" data-title="Inspekta Learn">

  <header class="fixed top-0 left-0 right-0 h-14 bg-navy-800 flex items-center px-4 z-50 shadow-lg">
    <button id="toggleBtn" class="text-white p-2 rounded-lg hover:bg-white/10 transition mr-3" title="Toggle Sidebar">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <a href="index.html" class="flex items-center gap-3">
      <img src="assets/img/logo1.jpeg" class="h-9 w-9 rounded-full ring-2 ring-white/30 object-cover" alt="Logo BNN">
      <div class="flex flex-col leading-tight">
        <span class="text-white font-bold text-base tracking-wide">SI MANDA</span>
        <span class="text-blue-200 text-xs">Sistem Informasi Monitoring Data</span>
      </div>
    </a>
    <div id="pageTitle" class="ml-6 px-3 py-1 bg-white/10 rounded-full text-white text-sm font-medium"></div>
    <div class="ml-auto flex items-center gap-2">
      <span id="userBadge" class="px-2.5 py-1 bg-white/10 rounded-full text-white text-xs font-medium"></span>
      <button onclick="authLogout()" class="flex items-center gap-1.5 px-3 py-1.5 bg-white/10 hover:bg-red-500/30 text-white text-xs rounded-lg transition">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Keluar
      </button>
    </div>
  </header>

  <aside id="sidebar" class="fixed top-14 left-0 h-[calc(100vh-3.5rem)] w-64 bg-navy-900 overflow-y-auto scrollbar-thin transition-transform duration-300 z-40 shadow-xl"></aside>

  <main id="main" class="ml-64 mt-14 min-h-[calc(100vh-3.5rem)] bg-gradient-to-br from-navy-950 via-navy-900 to-navy-800 transition-all duration-300">
    <div class="max-w-6xl mx-auto px-6 py-8">

      <!-- Page heading -->
      <div class="flex items-center gap-4 mb-8">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center shadow-lg shrink-0">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/>
          </svg>
        </div>
        <div>
          <h1 class="text-white font-bold text-2xl tracking-tight">Inspekta Learn</h1>
          <p class="text-slate-400 text-sm mt-0.5">Materi sosialisasi & pembelajaran yang dapat diunduh</p>
        </div>
      </div>

      <!-- Card grid -->
      <div id="cardGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>

      <!-- Empty state -->
      <div id="emptyState" class="hidden flex-col items-center justify-center py-20 text-center">
        <svg class="w-12 h-12 text-slate-600 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <p class="text-slate-500 text-sm">Tidak ada materi yang cocok.</p>
      </div>

    </div>
  </main>

  <!-- Update Banner -->
  <div id="update-banner" class="hidden fixed bottom-6 right-6 z-[9999] w-72 bg-navy-900 border border-white/10 rounded-2xl shadow-2xl p-4 flex-col gap-3"></div>

  <script src="js/pengawasan.js"></script>
  <script src="js/inspekta-learn.js"></script>
  <script src="js/updater.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BNN - SI MANDA</title>
  <link rel="icon" href="assets/img/logo1.ico">
  <script src="auth.js"></script>
  <script>if (!getSession()) window.location.replace('login.html');</script>
  <link rel="stylesheet" href="assets/css/index.css">
  <link rel="stylesheet" href="assets/css/sidebar.css">
  <link rel="stylesheet" href="assets/css/tailwind.min.css">
</head>

<body class="bg-slate-100 font-sans antialiased">

  <!-- ===== HEADER ===== -->
  <header class="fixed top-0 left-0 right-0 h-14 bg-navy-800 flex items-center px-4 z-50 shadow-lg">
    <button id="toggleBtn" class="text-white p-2 rounded-lg hover:bg-white/10 transition mr-3" title="Toggle Sidebar">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <a href="index.html" class="flex items-center gap-3">
      <img src="assets/img/logo1.jpeg" class="h-9 w-9 rounded-full ring-2 ring-white/30 object-cover" alt="Logo BNN">
      <div class="flex flex-col leading-tight">
        <span class="text-white font-bold text-base tracking-wide">SI MANDA</span>
        <span class="text-blue-200 text-xs">Sistem Informasi Monitoring Data</span>
      </div>
    </a>
    <div class="ml-auto flex items-center gap-2">
      <span id="userBadge" class="px-2.5 py-1 bg-white/10 rounded-full text-white text-xs font-medium"></span>
      <button onclick="authLogout()"
        class="flex items-center gap-1.5 px-3 py-1.5 bg-white/10 hover:bg-red-500/30 text-white text-xs rounded-lg transition">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Keluar
      </button>
    </div>
  </header>

  <!-- ===== SIDEBAR ===== -->
  <aside id="sidebar"
    class="fixed top-14 left-0 h-[calc(100vh-3.5rem)] w-64 bg-navy-900 overflow-y-auto scrollbar-thin transition-transform duration-300 z-40 shadow-xl">
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main id="main" class="ml-64 mt-14 h-[calc(100vh-3.5rem)] transition-all duration-300 relative overflow-hidden bg-gradient-to-br from-navy-950 via-navy-900 to-navy-800">

    <!-- Tech grid overlay -->
    <div class="absolute inset-0 tech-grid opacity-60 pointer-events-none"></div>

    <!-- Radial glow -->
    <div class="absolute left-1/2 top-1/2 w-[700px] h-[700px] rounded-full pulse-glow pointer-events-none"
         style="background: radial-gradient(circle, rgba(30, 77, 140, 0.55) 0%, rgba(15, 39, 68, 0.2) 45%, transparent 70%);"></div>

    <!-- Scan line -->
    <div class="absolute inset-x-0 h-24 scan-line pointer-events-none"
         style="background: linear-gradient(to bottom, transparent 0%, rgba(56, 189, 248, 0.12) 50%, transparent 100%);"></div>

    <!-- Floating particles -->
    <div id="particles" class="absolute inset-0 pointer-events-none overflow-hidden"></div>

    <!-- Corner HUD brackets -->
    <div class="absolute top-6 left-6 w-10 h-10 border-l-2 border-t-2 border-cyan-400/40 pointer-events-none"></div>
    <div class="absolute top-6 right-6 w-10 h-10 border-r-2 border-t-2 border-cyan-400/40 pointer-events-none"></div>
    <div class="absolute bottom-6 left-6 w-10 h-10 border-l-2 border-b-2 border-cyan-400/40 pointer-events-none"></div>
    <div class="absolute bottom-6 right-6 w-10 h-10 border-r-2 border-b-2 border-cyan-400/40 pointer-events-none"></div>

    <!-- Center: Logo + Rings -->
    <div class="absolute inset-0 flex flex-col items-center justify-center">
      <div class="relative flex items-center justify-center" style="width: 420px; height: 420px;">

        <!-- Outer rotating ring -->
        <svg class="absolute inset-0 w-full h-full spin-slow" viewBox="0 0 420 420" fill="none">
          <circle cx="210" cy="210" r="200" stroke="rgba(56, 189, 248, 0.25)" stroke-width="1" class="hex-dashed"/>
          <circle cx="210" cy="210" r="200" stroke="rgba(56, 189, 248, 0.15)" stroke-width="1"/>
          <circle cx="210" cy="10"  r="4" fill="#38bdf8"/>
          <circle cx="210" cy="410" r="4" fill="#38bdf8"/>
          <circle cx="10"  cy="210" r="3" fill="#60a5fa"/>
          <circle cx="410" cy="210" r="3" fill="#60a5fa"/>
        </svg>

        <!-- Inner counter-rotating ring -->
        <svg class="absolute w-[340px] h-[340px] spin-reverse" viewBox="0 0 340 340" fill="none">
          <circle cx="170" cy="170" r="165" stroke="rgba(96, 165, 250, 0.2)" stroke-width="1" stroke-dasharray="4 8"/>
          <circle cx="170" cy="5"   r="3" fill="#60a5fa"/>
          <circle cx="170" cy="335" r="3" fill="#60a5fa"/>
        </svg>

        <!-- Logo -->
        <img src="assets/img/war-on-drugs.png"
          class="relative w-64 h-64 object-contain logo-float"
          style="filter: drop-shadow(0 0 30px rgba(56, 189, 248, 0.45));"
          alt="BNN War on Drugs For Humanity">
      </div>

      <!-- Title -->
      <div class="mt-6 text-center">
        <h1 class="text-white font-bold text-2xl tracking-widest drop-shadow-lg">SI MANDA</h1>
        <p class="text-cyan-200/80 text-xs tracking-wider mt-1">SISTEM INFORMASI MONITORING DATA</p>
      </div>
    </div>

  </main>

  <!-- Update Banner -->
  <div id="update-banner" class="hidden fixed bottom-6 right-6 z-[9999] w-72 bg-navy-900 border border-white/10 rounded-2xl shadow-2xl p-4 flex-col gap-3">
    <div class="flex items-start gap-3">
      <div class="w-9 h-9 rounded-xl bg-blue-500/20 flex items-center justify-center shrink-0">
        <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-white text-sm font-semibold">Update Tersedia</p>
        <p id="update-version-text" class="text-slate-400 text-xs mt-0.5">Versi baru siap diinstal</p>
      </div>
      <button id="update-dismiss" class="text-slate-500 hover:text-slate-300 transition text-lg leading-none">&times;</button>
    </div>
    <button id="update-restart-btn" class="w-full py-2 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white text-sm font-semibold rounded-lg transition flex items-center justify-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Restart &amp; Install Update
    </button>
  </div>

  <script src="js/index.js"></script>
  <script src="js/updater.js"></script>

</body>
</html>

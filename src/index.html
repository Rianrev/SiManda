<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BNN - SI MANDA</title>
  <link rel="icon" href="assets/img/logo1.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: {
              950: '#0a1929',
              900: '#0f2744',
              800: '#1a3a5c',
              700: '#1e4d8c',
            }
          },
          transitionProperty: {
            'sidebar': 'transform, margin',
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .scrollbar-thin::-webkit-scrollbar { width: 4px; }
      .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
      .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    }
  </style>
</head>

<body class="bg-slate-100 font-sans antialiased">

  <!-- ===== HEADER ===== -->
  <header class="fixed top-0 left-0 right-0 h-14 bg-navy-800 flex items-center px-4 z-50 shadow-lg">
    <button id="toggleBtn" class="text-white p-2 rounded-lg hover:bg-white/10 transition mr-3" title="Toggle Sidebar">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <a href="index.html" class="flex items-center gap-3">
      <img src="assets/img/logo1.jpeg" class="h-9 w-9 rounded-full ring-2 ring-white/30 object-cover" alt="Logo BNN">
      <div class="flex flex-col leading-tight">
        <span class="text-white font-bold text-base tracking-wide">SI MANDA</span>
        <span class="text-blue-200 text-xs">Sistem Informasi Monitoring Data</span>
      </div>
    </a>
  </header>

  <!-- ===== SIDEBAR ===== -->
  <aside id="sidebar"
    class="fixed top-14 left-0 h-[calc(100vh-3.5rem)] w-64 bg-navy-900 overflow-y-auto scrollbar-thin transition-transform duration-300 z-40 shadow-xl">
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main id="main" class="ml-64 mt-14 h-[calc(100vh-3.5rem)] transition-all duration-300 relative overflow-hidden">
    <img src="assets/img/Picture3.png"
      class="absolute inset-0 w-full h-full object-cover"
      alt="SI MANDA Dashboard">
    <div class="absolute bottom-4 left-0 right-0 flex justify-center">
      <span class="bg-black/30 text-white text-xs px-3 py-1 rounded-full backdrop-blur-sm">
        Pilih menu di sidebar untuk mulai memantau data
      </span>
    </div>
  </main>

  <script>
    const toggleBtn = document.getElementById('toggleBtn');
    const sidebar   = document.getElementById('sidebar');
    const main      = document.getElementById('main');
    let open = true;

    toggleBtn.addEventListener('click', () => {
      open = !open;
      sidebar.classList.toggle('-translate-x-full', !open);
      main.classList.toggle('ml-64', open);
      main.classList.toggle('ml-0', !open);
    });

    document.addEventListener('DOMContentLoaded', () => {
      fetch('sidebar.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('sidebar').innerHTML = html;
          const all = document.querySelectorAll('#sidebar details');
          all.forEach(det => {
            det.addEventListener('toggle', () => {
              if (det.open) all.forEach(other => { if (other !== det) other.open = false; });
            });
          });
          const page = window.location.pathname.split('/').pop() || 'index.html';
          for (const a of document.querySelectorAll('#sidebar a')) {
            try {
              const u = new URL(a.href, window.location.href);
              if (u.pathname.split('/').pop() === page) { a.classList.add('active'); break; }
            } catch(e) {}
          }
        });
    });
  </script>

</body>
</html>

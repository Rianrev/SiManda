<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BNN - SI MANDA · Input Realisasi</title>
  <link rel="icon" href="assets/img/logo1.ico">
  <script src="auth.js"></script>
  <script>if (!getSession()) window.location.replace('login.html');</script>
  <link rel="stylesheet" href="assets/css/sidebar.css">
  <link rel="stylesheet" href="assets/css/tailwind.min.css">
</head>
<body class="bg-slate-100 font-sans antialiased" data-title="Input Realisasi">

  <header class="fixed top-0 left-0 right-0 h-14 bg-navy-800 flex items-center px-4 z-50 shadow-lg">
    <button id="toggleBtn" class="text-white p-2 rounded-lg hover:bg-white/10 transition mr-3" title="Toggle Sidebar">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <a href="index.html" class="flex items-center gap-3">
      <img src="assets/img/logo1.jpeg" class="h-9 w-9 rounded-full ring-2 ring-white/30 object-cover" alt="Logo BNN">
      <div class="flex flex-col leading-tight">
        <span class="text-white font-bold text-base tracking-wide">SI MANDA</span>
        <span class="text-blue-200 text-xs">Sistem Informasi Monitoring Data</span>
      </div>
    </a>
    <div id="pageTitle" class="ml-6 px-3 py-1 bg-white/10 rounded-full text-white text-sm font-medium"></div>
    <button onclick="inputGoBack()" class="ml-4 flex items-center gap-1.5 px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white text-sm rounded-lg transition">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      Kembali
    </button>
    <div class="ml-auto flex items-center gap-2">
      <span id="userBadge" class="px-2.5 py-1 bg-white/10 rounded-full text-white text-xs font-medium"></span>
      <button onclick="authLogout()" class="flex items-center gap-1.5 px-3 py-1.5 bg-white/10 hover:bg-red-500/30 text-white text-xs rounded-lg transition">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Keluar
      </button>
    </div>
  </header>

  <aside id="sidebar" class="fixed top-14 left-0 h-[calc(100vh-3.5rem)] w-64 bg-navy-900 overflow-y-auto scrollbar-thin transition-transform duration-300 z-40 shadow-xl"></aside>

  <main id="main" class="ml-64 mt-14 min-h-[calc(100vh-3.5rem)] bg-slate-100 transition-all duration-300">
    <div class="max-w-6xl mx-auto px-6 py-8">

      <!-- Heading -->
      <div class="flex items-center gap-3 mb-6">
        <div class="w-12 h-12 rounded-2xl bg-green-600 flex items-center justify-center shrink-0">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 17l6-6 4 4 8-8m0 0h-5m5 0v5"/>
          </svg>
        </div>
        <div>
          <h1 class="text-slate-800 font-bold text-xl tracking-tight">Input Realisasi</h1>
          <p id="satkerLabel" class="text-slate-500 text-sm">—</p>
        </div>
      </div>

      <!-- Tahun + Semester -->
      <div id="controlsBar" class="bg-white rounded-2xl border border-slate-200 p-5 mb-5 flex flex-wrap items-center gap-x-8 gap-y-4">
        <div class="flex items-center gap-3">
          <label class="text-slate-600 text-sm font-medium">Tahun Anggaran</label>
          <select id="tahunSelect" class="px-4 py-2 border border-slate-300 rounded-lg text-slate-800 text-sm focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500/40 bg-white"></select>
        </div>
        <div class="flex items-center gap-3">
          <label class="text-slate-600 text-sm font-medium">Semester</label>
          <select id="semesterSelect" class="px-4 py-2 border border-slate-300 rounded-lg text-slate-800 text-sm focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500/40 bg-white">
            <option value="I">Semester I</option>
            <option value="II">Semester II</option>
          </select>
        </div>
      </div>

      <!-- Cards (diisi JS) -->
      <div id="rows" class="flex flex-col gap-4"></div>

      <!-- Status + submit -->
      <div id="submitBar" class="mt-6 flex flex-col items-center gap-3 pb-6">
        <p id="statusMsg" class="text-sm text-center"></p>
        <button id="submitBtn" type="button"
          class="flex items-center justify-center gap-2 bg-green-600 hover:bg-green-500 active:bg-green-700 text-white px-10 py-3 rounded-xl font-semibold text-sm transition shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          <span>Simpan Realisasi</span>
        </button>
      </div>

    </div>
  </main>

  <!-- Update Banner -->
  <div id="update-banner" class="hidden fixed bottom-6 right-6 z-[9999] w-72 bg-navy-900 border border-white/10 rounded-2xl shadow-2xl p-4 flex-col gap-3"></div>

  <script src="js/input-config.js"></script>
  <script src="js/pengawasan.js"></script>
  <script src="js/input-realisasi.js"></script>
  <script src="js/updater.js"></script>
</body>
</html>
